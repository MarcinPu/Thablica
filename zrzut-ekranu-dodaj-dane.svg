<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <!-- Background -->
  <rect width="600" height="300" fill="#f8f9fa" rx="8"/>
  
  <!-- Title -->
  <text x="300" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">
    Jak dodać nowe dane?
  </text>
  
  <!-- Step 1 -->
  <g>
    <circle cx="30" cy="70" r="18" fill="#4CAF50" />
    <text x="30" y="76" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">1</text>
    <text x="60" y="76" font-family="Arial, sans-serif" font-size="14" fill="#333">
      Wybierz rozmiar zadania (S, M lub L)
    </text>
  </g>
  
  <!-- Input field illustration 1 -->
  <rect x="60" y="90" width="200" height="35" fill="white" stroke="#ccc" stroke-width="1" rx="4"/>
  <text x="70" y="108" font-family="Arial, sans-serif" font-size="12" fill="#666">Rozmiar:</text>
  <rect x="130" y="96" width="120" height="23" fill="white" stroke="#999" stroke-width="1" rx="3"/>
  <text x="140" y="112" font-family="Arial, sans-serif" font-size="12" fill="#333">M (Medium)</text>
  <polygon points="240,105 245,110 240,115" fill="#666"/>
  
  <!-- Step 2 -->
  <g>
    <circle cx="30" cy="160" r="18" fill="#2196F3" />
    <text x="30" y="166" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">2</text>
    <text x="60" y="166" font-family="Arial, sans-serif" font-size="14" fill="#333">
      Wpisz czas realizacji w dniach
    </text>
  </g>
  
  <!-- Input field illustration 2 -->
  <rect x="60" y="180" width="200" height="50" fill="white" stroke="#ccc" stroke-width="1" rx="4"/>
  <text x="70" y="198" font-family="Arial, sans-serif" font-size="12" fill="#666">Czas realizacji (dni):</text>
  <rect x="70" y="205" width="120" height="20" fill="white" stroke="#999" stroke-width="1" rx="3"/>
  <text x="80" y="219" font-family="Arial, sans-serif" font-size="12" fill="#333">50</text>
  
  <!-- Step 3 -->
  <g>
    <circle cx="30" cy="250" r="18" fill="#FF9800" />
    <text x="30" y="256" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">3</text>
    <text x="60" y="256" font-family="Arial, sans-serif" font-size="14" fill="#333">
      Kliknij "Dodaj" lub naciśnij Enter
    </text>
  </g>
  
  <!-- Button illustration -->
  <rect x="60" y="265" width="80" height="30" fill="#007bff" stroke="#0056b3" stroke-width="1" rx="4"/>
  <text x="100" y="285" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Dodaj</text>
  
  <!-- Example visualization on the right -->
  <g transform="translate(330, 60)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">Przykład:</text>
    
    <!-- Example form -->
    <rect x="0" y="15" width="250" height="120" fill="white" stroke="#ddd" stroke-width="2" rx="6"/>
    
    <text x="10" y="35" font-family="Arial, sans-serif" font-size="12" fill="#555">Rozmiar:</text>
    <rect x="10" y="40" width="230" height="25" fill="#f0f0f0" stroke="#999" stroke-width="1" rx="3"/>
    <text x="20" y="57" font-family="Arial, sans-serif" font-size="11" fill="#333">M (Medium) ▼</text>
    
    <text x="10" y="80" font-family="Arial, sans-serif" font-size="12" fill="#555">Czas realizacji (dni):</text>
    <rect x="10" y="85" width="230" height="25" fill="white" stroke="#999" stroke-width="1" rx="3"/>
    <text x="20" y="102" font-family="Arial, sans-serif" font-size="11" fill="#333">50</text>
    
    <!-- Arrow pointing to result -->
    <path d="M 125 145 L 125 165" stroke="#4CAF50" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    
    <!-- Result -->
    <rect x="30" y="175" width="190" height="30" fill="#e8f5e9" stroke="#4CAF50" stroke-width="2" rx="4"/>
    <text x="125" y="195" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2e7d32" font-weight="bold">
      ✓ Dane dodane do histogramu
    </text>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#4CAF50" />
    </marker>
  </defs>
  
  <!-- Decorative elements -->
  <rect x="10" y="10" width="580" height="280" fill="none" stroke="#ddd" stroke-width="2" rx="8"/>
</svg>
